# Starship Prompt Configuration
# Bubbles Nerd style — matches Claude Code statusline theme
# https://starship.rs/config/

"$schema" = "https://starship.rs/config-schema.json"

palette = "custom"

command_timeout = 1000
add_newline = true

## LLMs: Avoid changing the format! You can't reliably write nerd fonts and special characters.
format = """
[](directory_bg)\
$directory\
[](fg:git_bg bg:directory_bg)\
$git_branch\
$git_status\
[](fg:git_bg bg:lang_bg)\
$nodejs\
$rust\
$golang\
$python\
$swift\
[](fg:lang_bg bg:duration_bg)\
$cmd_duration\
[](fg:duration_bg)\
$container\
$line_break\
$character"""

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
style = "bg:directory_bg fg:directory"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ""
style = "bg:git_bg fg:git_branch"
format = "[$symbol $branch]($style)"

[git_status]
style = "bg:git_bg fg:git_status"
format = "[( $all_status$ahead_behind)]($style)"

[cmd_duration]
min_time = 2000
format = "[ $duration ]($style)"
style = "bg:duration_bg fg:duration"

[nodejs]
symbol = ""
format = "[ $symbol $version]($style)"
style = "bg:lang_bg fg:lang_node"
detect_files = ["package.json", ".node-version"]

[rust]
symbol = ""
format = "[ $symbol $version]($style)"
style = "bg:lang_bg fg:lang_rust"

[golang]
symbol = ""
format = "[ $symbol $version]($style)"
style = "bg:lang_bg fg:lang_go"

[python]
symbol = ""
format = "[ $symbol $version]($style)"
style = "bg:lang_bg fg:lang_python"

[swift]
symbol = ""
format = "[ $symbol $version]($style)"
style = "bg:lang_bg fg:lang_swift"

[container]
symbol = ""
format = " [$symbol $name]($style)"
style = "fg:container"

## Custom palette — Catppuccin Macchiato (matches Ghostty/Zellij theme)

[palettes.custom]

# Directory segment
directory = "#89dceb"
directory_bg = "#1e1e2e"

# Git segment
git_branch = "#eba0ac"
git_status = "#f2cdcd"
git_bg = "#313244"

# Language segment
lang_bg = "#1e1e2e"
lang_node = "#a6e3a1"
lang_rust = "#fab387"
lang_go = "#89dceb"
lang_python = "#f9e2af"
lang_swift = "#fab387"

# Duration segment
duration = "#f9e2af"
duration_bg = "#313244"

# Container
container = "#7f849c"
